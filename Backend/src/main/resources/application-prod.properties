# ── Production profile overrides ──────────────────────────────────────────────
# Activated via SPRING_PROFILES_ACTIVE=prod (set in docker-compose or env vars)

# JWT — no fallback; app will fail to start if JWT_SECRET is not set in prod
app.jwt.secret=${JWT_SECRET}

# Flyway — don't auto-baseline in production; migrations must be explicit
spring.flyway.baseline-on-migrate=false

# Disable Spring Security's verbose startup banner
spring.security.user.name=disabled
spring.security.user.password=disabled

# Reduce SQL noise in prod logs
logging.level.org.springframework.jdbc=WARN
logging.level.org.flywaydb=INFO
logging.level.com.gotcherapp=INFO

# Actuator — keep health visible but hide internals
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
