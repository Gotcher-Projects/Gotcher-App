# Server
server.port=${PORT:3001}


# Database
spring.datasource.url=jdbc:postgresql://${PGHOST:127.0.0.1}:${PGPORT:5432}/${PGDATABASE:gotcherapp}
spring.datasource.username=${PGUSER:gotcherapp_app}
spring.datasource.password=${PGPASSWORD:changeme_local}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway — reads migration files from Backend/db/migration/ (relative to working directory)
spring.flyway.locations=filesystem:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
# V7 was added as a placeholder after V8 was already applied to existing DBs; out-of-order
# lets Flyway apply it retroactively without blocking startup.
spring.flyway.out-of-order=true

# JWT
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-32c}
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000

# CORS
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:3000}

# Disable Spring Security's default login page banner
spring.security.user.name=disabled
spring.security.user.password=disabled

# Mail (optional — email features silently disabled when SMTP_HOST is blank)
# Configure via env vars: SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD
# See Backend/.env.example for setup instructions (Gmail / Resend / Mailtrap)
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.smtp.from=${SMTP_FROM:noreply@cradlehq.app}

# App URLs
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.backend-url=${BACKEND_URL:http://localhost:3001}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Cookies — set SECURE_COOKIES=true in production (requires HTTPS / Caddy TLS termination)
app.cookies.secure=${SECURE_COOKIES:false}

# Actuator — expose health endpoint for reverse proxy / container health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Multipart upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
