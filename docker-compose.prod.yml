services:
  caddy:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://${APP_DOMAIN}/api
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"
    depends_on:
      - api

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "4"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: gotcherapp
      PGUSER: gotcherapp_app
      PGPASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: https://${APP_DOMAIN}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@cradlehq.app}
      BACKEND_URL: https://${APP_DOMAIN}/api
      CORS_ORIGINS: https://${APP_DOMAIN},http://localhost,https://localhost,capacitor://localhost
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: gotcherapp
      POSTGRES_USER: gotcherapp_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotcherapp_app -d gotcherapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
